name: Import Inclusive Playgrounds Once

on:
  push:
    branches:
      - cursor/import-inclusive-playgrounds-a4d9
    paths:
      - ".github/workflows/import-inclusive-playgrounds-once.yml"
      - "maplocation/data/inclusive_playgrounds_ca_2023.csv"
      - "maplocation/locations/management/commands/import_inclusive_playgrounds.py"
      - "maplocation/requirements.txt"

permissions:
  contents: read

env:
  AWS_REGION: us-west-2
  RDS_SECRET_ID: kindd/prod/rds
  DJANGO_SECRET_KEY: import-only
  DJANGO_DEBUG: "false"

jobs:
  import-playgrounds:
    name: Import inclusive playgrounds
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: maplocation/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r maplocation/requirements.txt

      - name: Load production database settings
        run: |
          python - <<'PY'
          import json
          import os

          import boto3

          client = boto3.client("secretsmanager", region_name=os.environ["AWS_REGION"])
          secret = json.loads(
              client.get_secret_value(SecretId=os.environ["RDS_SECRET_ID"])["SecretString"]
          )

          env_values = {
              "DB_NAME": secret["dbname"],
              "DB_USER": secret["username"],
              "DB_PASSWORD": secret["password"],
              "DB_HOST": secret["host"],
              "DB_PORT": str(secret["port"]),
              "DB_SSL_REQUIRE": "true" if secret.get("sslmode", "require") == "require" else "false",
          }

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for key, value in env_values.items():
                  env_file.write(f"{key}<<EOF\n{value}\nEOF\n")
          PY

      - name: Run production migrations
        run: |
          cd maplocation
          python manage.py fix_migrations || echo "Migration fix skipped or failed"
          python manage.py migrate --noinput

      - name: Import inclusive playgrounds
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          cd maplocation
          GEOCODE_FLAG=""
          if [ -n "${MAPBOX_ACCESS_TOKEN:-}" ]; then
            GEOCODE_FLAG="--geocode"
          fi
          python manage.py import_inclusive_playgrounds ${GEOCODE_FLAG}

      - name: Verify production API counts
        run: |
          python - <<'PY'
          import json
          import urllib.request

          for label, url in {
              "categories": "https://api.kinddhelp.com/api/categories/",
              "locations": "https://api.kinddhelp.com/api/locations/",
          }.items():
              with urllib.request.urlopen(url, timeout=20) as response:
                  data = json.load(response)
              print(f"{label}: {data.get('count')}")
          PY
