<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - brand dark blue -->
  <rect width="1200" height="630" fill="#004877"/>
  
  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004877;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003355;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#FFC923" opacity="0.15"/>
  <circle cx="1100" cy="530" r="100" fill="#0D9DDB" opacity="0.15"/>
  <circle cx="200" cy="550" r="60" fill="#4DAA50" opacity="0.15"/>
  
  <!-- Main heading -->
  <text x="600" y="220" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    KiNDD
  </text>
  
  <!-- Subheading -->
  <text x="600" y="290" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#FFC923" text-anchor="middle">
    NDD Resource Navigator
  </text>
  
  <text x="600" y="340" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#FFC923" text-anchor="middle">
    Los Angeles County
  </text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
    Free Interactive Map • 370+ Providers
  </text>
  
  <!-- Footer -->
  <text x="600" y="520" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" opacity="0.8">
    Find ABA Therapy and NDD Services
  </text>
</svg>

